- id: bnfd_010
  category: edge_case
  description: "Negative trigger count contributes zero trigger points"
  inputs:
    opportunity_id: bnfd_010
    days_in_stage: 10
    anti_qualification_ratio: 2.5
    clone_profile_match: false
    trigger_event_count: -4
    persona_coverage_score: 0.5
    outcome_signal: UNKNOWN
  expected:
    score_min: 20.0
    score_max: 21.0
    score_breakdown:
      trigger_events: 0.0
- id: bnfd_011
  category: edge_case
  description: "Days-in-stage penalty saturates at the penalty window"
  inputs:
    opportunity_id: bnfd_011
    days_in_stage: 999
    anti_qualification_ratio: 1.0
    clone_profile_match: true
    trigger_event_count: 3
    persona_coverage_score: 1.0
    outcome_signal: STRONG
  expected:
    score_min: 75.0
    score_max: 75.0
    score_breakdown:
      days_in_stage_penalty: -15.0
