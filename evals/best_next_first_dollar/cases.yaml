      - opportunity_id: bnfd_002_fresh
        days_in_stage: 12
        anti_qualification_ratio: 1.4
        clone_profile_match: true
        trigger_event_count: 1
        persona_coverage_score: 0.45
        outcome_signal: WEAK
      - opportunity_id: bnfd_002_stale
        days_in_stage: 120
        anti_qualification_ratio: 1.1
        clone_profile_match: true
        trigger_event_count: 2
        persona_coverage_score: 0.5
        outcome_signal: WEAK
      - opportunity_id: bnfd_002_dark
        days_in_stage: 8
        anti_qualification_ratio: 3.8
        clone_profile_match: false
        trigger_event_count: 0
        persona_coverage_score: 0.1
        outcome_signal: UNKNOWN
  expected:
    expected_order:
      - bnfd_002_fresh
      - bnfd_002_stale
      - bnfd_002_dark
- id: bnfd_003
  category: ranking
  description: "Four-way ranking separates outcome and coverage signals"
  inputs:
    opportunities:
      - opportunity_id: bnfd_003_clone_low
        days_in_stage: 25
        anti_qualification_ratio: 2.0
        clone_profile_match: true
        trigger_event_count: 0
        persona_coverage_score: 0.25
        outcome_signal: UNKNOWN
      - opportunity_id: bnfd_003_coverage
        days_in_stage: 25
        anti_qualification_ratio: 2.0
        clone_profile_match: false
        trigger_event_count: 2
        persona_coverage_score: 0.9
        outcome_signal: WEAK
      - opportunity_id: bnfd_003_strong
        days_in_stage: 25
        anti_qualification_ratio: 1.6
        clone_profile_match: true
        trigger_event_count: 1
        persona_coverage_score: 0.75
        outcome_signal: STRONG
      - opportunity_id: bnfd_003_none
        days_in_stage: 95
        anti_qualification_ratio: 3.5
        clone_profile_match: false
        trigger_event_count: 0
        persona_coverage_score: 0.35
        outcome_signal: NONE
  expected:
    expected_order:
      - bnfd_003_strong
      - bnfd_003_coverage
      - bnfd_003_clone_low
      - bnfd_003_none
- id: bnfd_004
