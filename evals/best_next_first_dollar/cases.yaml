- id: bnfd_009
  category: confidence
  description: "Neither clone nor high coverage produces low confidence"
  inputs:
    opportunity_id: bnfd_009
    days_in_stage: 10
    anti_qualification_ratio: 2.0
    clone_profile_match: false
    trigger_event_count: 1
