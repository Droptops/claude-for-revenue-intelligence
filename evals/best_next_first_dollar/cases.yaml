- id: bnfd_007
  category: confidence
  description: "Clone match and coverage above 0.6 produce high confidence"
  inputs:
    opportunity_id: bnfd_007
    days_in_stage: 10
    anti_qualification_ratio: 2.0
    clone_profile_match: true
    trigger_event_count: 1
    persona_coverage_score: 0.7
    outcome_signal: UNKNOWN
  expected:
    confidence: HIGH
- id: bnfd_008
  category: confidence
  description: "One strong confidence input produces medium confidence"
  inputs:
    opportunity_id: bnfd_008
    days_in_stage: 10
    anti_qualification_ratio: 2.0
    clone_profile_match: true
    trigger_event_count: 1
    persona_coverage_score: 0.2
    outcome_signal: UNKNOWN
