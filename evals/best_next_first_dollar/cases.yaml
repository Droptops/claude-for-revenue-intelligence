- id: bnfd_001
  category: ranking
  description: "Strong clone, coverage, triggers, and outcome rank first"
  inputs:
    opportunities:
      - opportunity_id: bnfd_001_high
        days_in_stage: 10
        anti_qualification_ratio: 1.2
        clone_profile_match: true
        trigger_event_count: 3
        persona_coverage_score: 0.8
        outcome_signal: STRONG
      - opportunity_id: bnfd_001_mid
        days_in_stage: 20
        anti_qualification_ratio: 2.5
        clone_profile_match: false
        trigger_event_count: 1
        persona_coverage_score: 0.7
        outcome_signal: WEAK
      - opportunity_id: bnfd_001_low
        days_in_stage: 120
        anti_qualification_ratio: 4.0
        clone_profile_match: false
        trigger_event_count: 0
        persona_coverage_score: 0.2
        outcome_signal: NONE
  expected:
    expected_order:
      - bnfd_001_high
      - bnfd_001_mid
      - bnfd_001_low
- id: bnfd_002
  category: ranking
