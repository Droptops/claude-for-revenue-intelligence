- id: aq_001
  category: happy_path
  description: "Heavy consulting buyer is clear political cover"
  inputs:
    opportunity_id: aq_001
    consulting_spend: 800000.0
    implementation_spend: 200000.0
    data_source: CRM
  expected:
    anti_qual_label: POLITICAL_COVER
    confidence: HIGH
    ratio_approx: 4.0
- id: aq_002
  category: happy_path
  description: "Implementation-heavy buyer is real change"
  inputs:
    opportunity_id: aq_002
    consulting_spend: 125000.0
    implementation_spend: 500000.0
    data_source: CRM
  expected:
    anti_qual_label: REAL_CHANGE
    confidence: HIGH
    ratio_approx: 0.25
- id: aq_003
  category: happy_path
  description: "Middle-band ratio remains ambiguous"
  inputs:
    opportunity_id: aq_003
    consulting_spend: 400000.0
    implementation_spend: 200000.0
    data_source: CRM_PARTIAL
  expected:
    anti_qual_label: AMBIGUOUS
    confidence: MEDIUM
    ratio_approx: 2.0
- id: aq_004
  category: happy_path
  description: "Slightly above the political-cover threshold"
